name: servflow
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: true
  android: true
  ios: true
  windows:
    generate: true
  macos:
    generate: true
